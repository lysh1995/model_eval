<div id="ceval-root">
  <style>
    #ceval-root { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      color: #1a1a2e; line-height: 1.5; max-width: 1100px; margin: 0 auto; padding: 24px; }
    #ceval-root h1 { font-size: 22px; margin: 0 0 4px; }
    #ceval-root .sub { color: #6b7280; font-size: 13px; margin-bottom: 20px; }
    #ceval-root .ledger { display: flex; gap: 10px; flex-wrap: wrap; margin: 16px 0; }
    #ceval-root .chip { border-radius: 8px; padding: 8px 14px; font-size: 13px; font-weight: 600; }
    #ceval-root .chip small { display:block; font-weight: 400; font-size: 11px; opacity: .8; }
    #ceval-root .gate { background:#fee2e2; color:#991b1b; }
    #ceval-root .guide { background:#dbeafe; color:#1e40af; }
    #ceval-root .trap { background:#fef3c7; color:#92400e; }
    #ceval-root section { margin: 28px 0; }
    #ceval-root h2 { font-size: 15px; text-transform: uppercase; letter-spacing: .05em;
      color:#374151; border-bottom: 2px solid #e5e7eb; padding-bottom: 6px; }
    #ceval-root .langtag { display:inline-block; background:#111827; color:#fff; font-size:11px;
      padding: 1px 7px; border-radius: 4px; margin-left: 8px; vertical-align: middle; }
    #ceval-root table { width:100%; border-collapse: collapse; font-size: 13px; margin: 10px 0; }
    #ceval-root th { text-align:left; color:#6b7280; font-weight:600; padding: 6px 10px;
      border-bottom: 1px solid #e5e7eb; font-size: 12px; }
    #ceval-root td { padding: 8px 10px; border-bottom: 1px solid #f3f4f6; }
    #ceval-root .bar { height: 8px; border-radius: 4px; background:#e5e7eb; position: relative; min-width: 120px; }
    #ceval-root .bar > i { position:absolute; height:100%; border-radius:4px; left:0; }
    #ceval-root .val { font-variant-numeric: tabular-nums; font-weight: 600; }
    #ceval-root .ci { color:#9ca3af; font-size: 11px; font-variant-numeric: tabular-nums; }
    #ceval-root .cav { color:#6b7280; font-size: 11px; }
    #ceval-root .trapbox { background:#fffbeb; border:1px solid #fde68a; border-radius:10px; padding: 14px 18px; }
    #ceval-root .trapbox .warn { color:#92400e; font-weight:700; font-size:12px; text-transform:uppercase; letter-spacing:.04em; }
    #ceval-root .cannot { background:#f9fafb; border-left: 4px solid #111827; border-radius: 0 8px 8px 0;
      padding: 14px 18px; }
    #ceval-root .cannot li { margin: 5px 0; color:#374151; font-size: 13px; }
    #ceval-root .src { font-size:10px; padding:1px 6px; border-radius:4px; background:#f3f4f6; color:#6b7280; }
    #ceval-root .obs { color:#b45309; font-size: 11px; font-style: italic; }
    #ceval-root footer { margin-top: 32px; padding-top: 14px; border-top: 1px solid #e5e7eb;
      color:#9ca3af; font-size: 11px; }
  </style>
  <div id="content">loading…</div>

  <script type="application/json" id="gradebook-data">__GRADEBOOK_JSON__</script>
  <script>
  (function () {
    const gb = JSON.parse(document.getElementById("gradebook-data").textContent);
    const esc = s => String(s).replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
    const fmt = v => (v==null||isNaN(v)) ? "—" : (Math.abs(v)<1 ? v.toFixed(3) : v.toFixed(1));
    const grades = gb.grades;
    const byRole = r => grades.filter(g => g.role === r);
    const dims = role => [...new Set(byRole(role).map(g => g.dimension))];
    const langs = gb.languages;

    function bar(v, max, color) {
      const pct = max ? Math.max(2, Math.min(100, 100*Math.abs(v)/max)) : 2;
      return `<div class="bar"><i style="width:${pct}%;background:${color}"></i></div>`;
    }

    function metricTable(role, color) {
      let html = "";
      for (const lang of langs) {
        const ds = dims(role).filter(d => grades.some(g =>
          g.dimension===d && g.language===lang && g.role===role));
        if (!ds.length) continue;
        for (const dim of ds) {
          const rows = grades.filter(g => g.dimension===dim && g.language===lang
            && g.role===role && g.segment!=="self_selected_arm");
          if (!rows.length) continue;
          const max = Math.max(...rows.map(r => Math.abs(r.value)||0), 0.001);
          html += `<h3 style="font-size:13px;margin:16px 0 4px">${esc(dim)}
            <span class="langtag">${esc(lang)}</span>
            <span class="src">${esc(rows[0].source)}</span></h3>`;
          html += `<table><tr><th>variant</th><th>value</th><th></th><th>95% CI</th>
            <th>n</th><th>note</th></tr>`;
          rows.sort((a,b)=>a.value-b.value);
          for (const r of rows) {
            const ci = r.interval ? `[${fmt(r.interval[0])}, ${fmt(r.interval[1])}]` : "";
            const cav = (r.caveats||[])[0] ? esc(r.caveats[0].slice(0,60)) : "";
            const obs = r.segment==="self_selected_arm" ? ` <span class="obs">observational</span>`:"";
            html += `<tr><td>${esc(r.variant_id)}${obs}</td>
              <td class="val">${fmt(r.value)}</td><td>${bar(r.value,max,color)}</td>
              <td class="ci">${ci}</td><td class="ci">${r.n_effective} ${esc(r.n_unit)}</td>
              <td class="cav">${cav}</td></tr>`;
          }
          html += `</table>`;
        }
      }
      return html || "<p class='cav'>none</p>";
    }

    let out = `<h1>${esc(gb.title)}</h1>
      <div class="sub">dataset ${esc(gb.dataset_id)} · evaluators ${esc(gb.evaluator_ids.join(", "))}
      · ${esc(gb.created_iso.slice(0,19))}</div>
      <div class="ledger">
        <div class="chip gate">${gb.counts.gate} GATE<small>may block a ship</small></div>
        <div class="chip guide">${gb.counts.guide} GUIDE<small>informs a human</small></div>
        <div class="chip trap">${gb.counts.trap} TRAP<small>collected, never headlined</small></div>
      </div>`;

    out += `<section><h2>Gates — the only metrics that may block a ship</h2>
      ${metricTable("gate", "#dc2626")}</section>`;
    out += `<section><h2>Guides — what to change, and why</h2>
      ${metricTable("guide", "#2563eb")}</section>`;

    const traps = byRole("trap");
    if (traps.length) {
      out += `<section><h2>Traps — collected, walled off, never optimised</h2>
        <div class="trapbox"><div class="warn">⚠ do not headline · do not optimise</div>
        <p class="cav" style="margin:8px 0">These summarise approval, not quality. Chai got +30.3%
        D30 from optimising signals like these; OpenAI's April-2025 sycophancy rollback happened
        because a thumbs-up entered the reward and the A/B tests approved of it. Shown for
        completeness, never as a verdict.</p><table><tr><th>signal</th><th>variant</th>
        <th>value</th><th>gameable by</th></tr>`;
      for (const t of traps.sort((a,b)=>a.dimension.localeCompare(b.dimension))) {
        out += `<tr><td>${esc(t.dimension)}</td><td>${esc(t.variant_id)}</td>
          <td class="val">${fmt(t.value)}</td>
          <td class="cav">${esc((t.caveats||[""])[0].slice(0,70))}</td></tr>`;
      }
      out += `</table></div></section>`;
    }

    out += `<section><h2>What this grade book cannot measure</h2>
      <div class="cannot"><ul>`;
    for (const c of gb.cannot_measure) out += `<li>${esc(c)}</li>`;
    out += `</ul></div></section>`;

    out += `<footer>Every number carries its role, interval, effective-n (conversations, not
      turns), and caveats — in the data, not in a doc. The platform refuses to pool across
      languages (ρ(en,zh) = −0.082), refuses to headline a trap, and refuses to treat the
      self-selected arm as causal.</footer>`;

    document.getElementById("content").innerHTML = out;
  })();
  </script>
</div>
